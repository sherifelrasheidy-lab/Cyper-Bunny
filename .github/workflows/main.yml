name: Mobile APK Cloud Builder
on: [push, workflow_dispatch]

jobs:
  export-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Godot Engine
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          use-dotnet: false

      - name: Download and Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          curl -L -o templates.tpz https://github.com
          unzip templates.tpz -d templates_extracted
          mv templates_extracted/templates/* ~/.local/share/godot/export_templates/4.3.stable/
          rm -rf templates.tpz templates_extracted

      - name: Unzip & Extract Project File to Root Safely
        run: |
          unzip cyper_bunny_2026-06-28_05-07-29.zip -d extracted_temp
          # Locate the project file safely and handle paths with quotes
          TARGET_PATH=$(find extracted_temp -name "project.godot" -print -quit)
          TARGET_DIR=$(dirname "$TARGET_PATH")
          
          if [ -d "$TARGET_DIR" ]; then
            echo "Found project files in: $TARGET_DIR"
            cp -RL "$TARGET_DIR"/* .
          else
            echo "Warning: project.godot not found in subdirectories, copying root files."
            cp -RL extracted_temp/* . || true
          fi
          rm -rf extracted_temp
          mkdir -p build/android

      - name: Generate Temporary Android Debug Keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 365

      - name: Configure Godot Engine Android Parameters
        run: |
          mkdir -p ~/.config/godot
          echo '[settings]' > ~/.config/godot/editor_settings-4.tres
          echo 'export/android/android_sdk_path = "'"$ANDROID_HOME"'"' >> ~/.config/godot/editor_settings-4.tres
          
          echo '[preset.0]' > export_presets.cfg
          echo 'name="Android"' >> export_presets.cfg
          echo 'platform="Android"' >> export_presets.cfg
          echo 'runnable=true' >> export_presets.cfg
          echo 'export_filter="all_resources"' >> export_presets.cfg
          echo 'export_path="build/android/CyberBunny.apk"' >> export_presets.cfg
          echo '[preset.0.options]' >> export_presets.cfg
          echo 'keystore/debug="res://debug.keystore"' >> export_presets.cfg
          echo 'keystore/debug_user="androiddebugkey"' >> export_presets.cfg
          echo 'keystore/debug_password="android"' >> export_presets.cfg

      - name: Execute Android APK Production Build
        run: godot --headless --export-release "Android" build/android/CyberBunny.apk

      - name: Upload Finished APK Asset
        uses: actions/upload-artifact@v4
        with:
          name: CyberBunny-Mobile-Build
          path: build/android/CyberBunny.apk
